<div class="container">
  <h2>Create Payroll</h2>

  <form (ngSubmit)="submitPayroll()" #payrollForm="ngForm">

    <div>
      <label>Employee Name</label>
      <input type="text"
             name="employee_name"
             [(ngModel)]="payrollData.employee_name"
             required />
    </div>

    <div>
      <label>Basic Salary</label>
      <input type="number"
             name="basic_salary"
             [(ngModel)]="payrollData.basic_salary"
             required />
    </div>

    <div>
      <label>Bonus</label>
      <input type="number"
             name="bonus"
             [(ngModel)]="payrollData.bonus"
             required />
    </div>

    <button type="submit">Submit</button>

  </form>

  <p>{{ message }}</p>
</div>
